services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    working_dir: /app

  telegram:
    build: .
    env_file: .env
    command: python telegram/bot.py
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - api
